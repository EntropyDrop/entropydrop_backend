version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ed_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ed_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: ed_app
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ed_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  migrate:
    build: .
    container_name: ed_migrate
    profiles:
      - tools
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ed_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db

  background:
    build: .
    container_name: ed_background
    restart: always
    command: ["python", "background_service.py"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ed_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - app

  nginx:
    image: nginx:alpine
    container_name: ed_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
